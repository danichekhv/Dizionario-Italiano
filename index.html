<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizionario Italiano</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --parchment: #ede5d0;
    --ink: #1a1208;
    --ink-light: #3d2e0f;
    --terracotta: #c4522a;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --sage: #4a5e3a;
    --stone: #8b7355;
    --muted: #7a6a50;
    --border: rgba(139,115,85,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { max-width: 100%; overflow-x: hidden; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(196,82,42,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(184,134,11,0.05) 0%, transparent 50%);
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 52px;
    position: relative;
  }

  .header-ornament {
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 72px);
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--terracotta);
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .header-rule {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 28px;
  }

  .header-rule::before,
  .header-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .rule-diamond {
    width: 8px;
    height: 8px;
    background: var(--terracotta);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* Search */
  .search-area {
    margin-bottom: 48px;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    width: 100%;
    padding: 18px 64px 18px 28px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    background: var(--parchment);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--ink);
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px rgba(26,18,8,0.06), inset 0 1px 3px rgba(26,18,8,0.04);
  }

  .search-input::placeholder {
    color: var(--stone);
    opacity: 0.6;
  }

  .search-input:focus {
    border-color: var(--terracotta);
    box-shadow: 0 4px 20px rgba(196,82,42,0.12), inset 0 1px 3px rgba(26,18,8,0.04);
    background: #f9f4ea;
  }

  .search-btn {
    position: absolute;
    right: 12px;
    background: var(--terracotta);
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: white;
  }

  .search-btn:hover {
    background: #a8411e;
    transform: scale(1.05);
  }

  .search-btn svg { width: 18px; height: 18px; }

  /* State messages */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-style: italic;
    font-size: 18px;
    display: none;
  }

  .state-msg.active { display: block; }

  .loading-dots {
    display: inline-flex;
    gap: 6px;
    margin-top: 16px;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    animation: bounce 1.4s infinite both;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Result card */
  .result-card {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .result-card.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Word header section */
  .word-hero {
    background: var(--parchment);
    border: 1.5px solid var(--border);
    border-radius: 6px 6px 0 0;
    padding: 36px 40px 28px;
    position: relative;
    overflow: hidden;
  }

  .word-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--terracotta), var(--gold), var(--terracotta));
  }

  .word-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
    font-style: normal;
    background: rgba(196,82,42,0.08);
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid rgba(196,82,42,0.2);
  }

  .word-main {
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .word-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .word-phonetic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--stone);
    background: rgba(139,115,85,0.1);
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* Stress highlight */
  .stress { color: var(--terracotta); font-weight: bold; }

  .word-gender {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--sage);
    font-weight: 300;
  }

  /* Translations section */
  .translations-section {
    background: white;
    border: 1.5px solid var(--border);
    border-top: none;
    padding: 28px 40px;
  }

  .lang-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 16px;
    align-items: start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .lang-row:last-child { border-bottom: none; }

  .lang-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    padding-top: 3px;
  }

  .lang-flag {
    display: inline-block;
    margin-right: 6px;
    font-size: 14px;
  }

  .translation-text {
    font-size: 20px;
    color: var(--ink);
    font-weight: 400;
    line-height: 1.4;
  }

  .translation-alts {
    font-size: 15px;
    color: var(--stone);
    font-style: italic;
    margin-top: 2px;
  }

  /* Definition */
  .definition-section {
    background: var(--parchment);
    border: 1.5px solid var(--border);
    border-top: none;
    padding: 28px 40px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .definition-text {
    font-size: 20px;
    color: var(--ink);
    line-height: 1.75;
    font-style: italic;
  }

  .example-text {
    font-size: 18px;
    color: var(--ink-light);
    margin-top: 14px;
    padding-left: 18px;
    border-left: 3px solid var(--terracotta);
    line-height: 1.7;
  }

  /* Conjugation section */
  .conjugation-section {
    background: white;
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    overflow: hidden;
  }

  .conjugation-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border-bottom: 1px solid transparent;
  }

  .conjugation-header:hover {
    background: var(--parchment);
  }

  .conjugation-header.open {
    border-bottom-color: var(--border);
    background: var(--parchment);
  }

  .conj-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--ink);
  }

  .conj-icon {
    width: 32px; height: 32px;
    background: var(--terracotta);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 14px;
    flex-shrink: 0;
  }

  .toggle-arrow {
    width: 28px; height: 28px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease, border-color 0.2s;
    color: var(--muted);
    flex-shrink: 0;
  }

  .conjugation-header.open .toggle-arrow {
    transform: rotate(180deg);
    border-color: var(--terracotta);
    color: var(--terracotta);
  }

  .conjugation-body {
    display: none;
    padding: 32px 40px;
  }

  .conjugation-body.open { display: block; }

  /* Tense tabs */
  .tense-tabs {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 28px;
  }

  .tense-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .tense-group-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .tense-group-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tense-tab {
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--stone);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tense-tab:hover {
    background: var(--parchment);
    color: var(--ink);
  }

  .tense-tab.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
    font-style: normal;
  }

  /* Conjugation table */
  .conj-table-wrap {
    animation: fadeUp 0.3s ease;
  }

  .tense-title-display {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .conj-grid-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .conj-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    min-width: 0;
  }

  @media (max-width: 560px) {
    .conj-grid { grid-template-columns: 1fr; }
  }

  .conj-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0;
    background: var(--parchment);
    border-radius: 3px;
    overflow: hidden;
  }

  .conj-pronoun {
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    background: rgba(139,115,85,0.12);
    display: flex;
    align-items: center;
  }

  .conj-form {
    padding: 10px 16px;
    font-size: 17px;
    color: var(--ink);
    font-weight: 400;
  }

  /* Mood sections */
  .mood-section { margin-bottom: 28px; }
  .mood-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
  }

  /* Error state */
  .error-msg {
    text-align: center;
    padding: 48px 20px;
    display: none;
  }

  .error-msg.active { display: block; }

  .error-icon {
    font-size: 36px;
    margin-bottom: 16px;
  }

  .error-text {
    font-style: italic;
    color: var(--muted);
    font-size: 18px;
  }

  /* Responsive */
  /* ── Favourites ─────────────────────────────────────────── */
  /* ── Hero action buttons group ──────────────────────────── */
  .hero-actions {
    position: absolute;
    top: 20px; right: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 2;
  }

  .hero-action-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: rgba(139,115,85,0.3);
    transition: all 0.2s;
    padding: 0;
    font-size: 18px;
    line-height: 1;
  }

  .hero-action-btn:hover { color: var(--stone); transform: scale(1.1); background: none; }
  .hero-action-btn.star:hover { color: var(--gold); background: none; }
  .hero-action-btn.star.starred { color: #d4a017; filter: drop-shadow(0 0 6px rgba(212,160,23,0.5)); }
  .hero-action-btn.refresh:hover { color: var(--stone); transform: rotate(30deg) scale(1.1); background: none; }
  .hero-action-btn.deck:hover { color: var(--sage); background: none; }

  body.mode-grammar .hero-action-btn { color: rgba(107,154,240,0.2); }
  body.mode-grammar .hero-action-btn:hover { color: #6b9af0; background: none; }
  body.mode-grammar .hero-action-btn.star.starred { color: #6b9af0; filter: drop-shadow(0 0 6px rgba(107,154,240,0.5)); }

  /* Keep old .star-btn for grammar (dynamically rendered) */
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 22px; line-height: 1;
    color: rgba(107,154,240,0.2);
    transition: all 0.2s; padding: 4px; z-index: 2;
  }

  .star-btn::after {
    display: none;
  }

  .star-btn:hover { color: var(--gold); transform: scale(1.1); }
  .star-btn.starred { color: #d4a017; filter: drop-shadow(0 0 8px rgba(212,160,23,0.6)); }

  body.mode-grammar .star-btn { color: rgba(107,154,240,0.2); }
  body.mode-grammar .star-btn:hover { color: #6b9af0; }
  body.mode-grammar .star-btn.starred { color: #6b9af0; filter: drop-shadow(0 0 8px rgba(107,154,240,0.6)); }

  /* Favourites panel */
  .fav-panel {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 320px;
    background: var(--parchment);
    border-left: 1.5px solid var(--border);
    z-index: 100;
    box-shadow: -8px 0 32px rgba(26,18,8,0.12);
    flex-direction: column;
    animation: slideIn 0.3s ease;
  }

  body.mode-grammar .fav-panel {
    background: #111c36;
    border-left-color: rgba(107,154,240,0.2);
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .fav-panel.open { display: flex; }

  .fav-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  body.mode-grammar .fav-panel-header { border-bottom-color: rgba(107,154,240,0.2); }

  .fav-panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  body.mode-grammar .fav-panel-title { color: #e8edf8; }

  .fav-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--muted);
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .fav-close:hover { color: var(--ink); }
  body.mode-grammar .fav-close { color: #6b7fa8; }
  body.mode-grammar .fav-close:hover { color: #e8edf8; }

  .fav-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  body.mode-grammar .fav-tabs { border-bottom-color: rgba(107,154,240,0.2); }

  .fav-tab {
    flex: 1;
    padding: 10px;
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    font-style: italic;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--stone);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .fav-tab.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
      }

  body.mode-grammar .fav-tab { color: #6b7fa8; }
  body.mode-grammar .fav-tab.active { color: #6b9af0; border-bottom-color: #6b9af0; }

  .fav-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .fav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 8px;
  }

  .fav-item:hover { background: rgba(139,115,85,0.1); }
  body.mode-grammar .fav-item:hover { background: rgba(107,154,240,0.08); }

  .fav-item-word {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--ink);
    flex: 1;
  }

  body.mode-grammar .fav-item-word { color: #e8edf8; }

  .fav-item-meta {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  body.mode-grammar .fav-item-meta { color: #6b7fa8; }

  .fav-item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 16px;
    padding: 2px 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .fav-item-del:hover { color: var(--terracotta); }

  .fav-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-style: italic;
    font-size: 15px;
  }

  body.mode-grammar .fav-empty { color: #6b7fa8; }

  /* Fav toggle button in header */
  .fav-toggle-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--terracotta);
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(196,82,42,0.35);
    transition: all 0.2s;
    z-index: 50;
  }

  .fav-toggle-btn:hover { transform: scale(1.1); }
  body.mode-grammar .fav-toggle-btn { background: #3b64b4; box-shadow: 0 4px 16px rgba(59,100,180,0.4); }

  .fav-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: #d4a017;
    color: white;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }

  .fav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 99;
  }

  .fav-overlay.open { display: block; }

  @media (max-width: 640px) {
    .fav-panel { width: 100%; }
  }

  @media (max-width: 640px) {

    };

// States that should be tracked in history (not loading/error/initial)
const TRACKABLE = ['result','rulist','grammar','favorites','carte'];

function showState(state) {
  // Auto-push history when moving between trackable states
  if (!_suppressHistory && TRACKABLE.includes(state) && TRACKABLE.includes(_currentState) && state !== _currentState) {
    const savedState = _currentState;
    const savedMode = currentMode;
    // Capture current content for restoration
    if (savedState === 'result' && currentDictEntry) {
      const e = currentDictEntry; const w = currentDictWord;
      pushHistory(savedState, () => {
        switchMode(savedMode, true);
        renderEntry(e); showState('result');
        currentDictEntry = e; currentDictWord = w;
        $('searchInput').value = e.word || w;
        checkIfStarred('dict', w);
      });
    } else if (savedState === 'grammar' && currentGramEntry) {
      const g = currentGramEntry; const t = currentGramTopic;
      pushHistory(savedState, () => {
        switchMode(savedMode, true);
        renderGrammar(g); showState('grammar');
      });
    } else if (savedState === 'rulist') {
      const el = $('ruResults').innerHTML;
      pushHistory(savedState, () => {
        switchMode(savedMode, true);
        $('ruResults').innerHTML = el;
        showState('rulist');
      });
    } else if (savedState === 'carte') {
      const savedDeckId = currentDeckId;
      const savedDeckName = currentDeckName;
      if (savedDeckId) {
        pushHistory(savedState, () => {
          switchMode('carte', true);
          openDeckView(savedDeckId, savedDeckName);
        });
      } else {
        pushHistory(savedState, () => {
          switchMode('carte', true);
          renderCarteScreen();
        });
      }
    } else if (savedState === 'favorites') {
      const tab = currentFavTab;
      pushHistory(savedState, () => {
        switchMode('favorites', true);
        renderFavList(tab);
      });
    }
  }

  _currentState = state;
  ['initialMsg','loadingMsg','errorMsg','resultCard','ruResults','grammarCard','favScreen','carteScreen','flashcardScreen','writeScreen']
    .forEach(id => $(id).classList.remove('active'));
  if (state === 'initial')        $('initialMsg').classList.add('active');
  else if (state === 'loading')   $('loadingMsg').classList.add('active');
  else if (state === 'error')     $('errorMsg').classList.add('active');
  else if (state === 'result')    $('resultCard').classList.add('active');
  else if (state === 'rulist')    $('ruResults').classList.add('active');
  else if (state === 'grammar')   $('grammarCard').classList.add('active');
  else if (state === 'favorites') $('favScreen').classList.add('active');
  else if (state === 'carte')     $('carteScreen').classList.add('active');
  updateBackBtn();
}

// ── Gemini API ────────────────────────────────────────────────────────────────
async function callGemini(prompt) {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.2 }
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const objStart = text.indexOf('{');
  const arrStart = text.indexOf('[');
  // Pick whichever comes first in the response
  if (arrStart !== -1 && (objStart === -1 || arrStart < objStart)) {
    const arrEnd = text.lastIndexOf(']');
    if (arrEnd !== -1) return JSON.parse(text.slice(arrStart, arrEnd + 1));
  }
  if (objStart !== -1) {
    const objEnd = text.lastIndexOf('}');
    if (objEnd !== -1) return JSON.parse(text.slice(objStart, objEnd + 1));
  }
  throw new Error('No JSON found in: ' + text.slice(0, 200));
}

function parseInline(text) {
  return (text || '')
    .replace(/\\\*/g, '____STAR____')   // protect escaped \*
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
    .replace(/____STAR____/g, '*');
}

      `;
      if (ex.pair === 'prev' && currentPair) {
        // Add arrow connector and append to pair group
        const arrow = document.createElement('div');
        arrow.className = 'grammar-example-arrow';
        arrow.textContent = '↓';
        currentPair.appendChild(arrow);
        currentPair.appendChild(el);
      } else {
        currentPair = document.createElement('div');
        currentPair.className = 'grammar-example-group';
        currentPair.appendChild(el);
        list.appendChild(currentPair);
      }
    });
    sec.appendChild(list);
    card.appendChild(sec);
  }

  // Errors
  if (g.errors && g.errors.length > 0) {
    const sec = makeSec('Типичные ошибки');
    const list = document.createElement('div');
    list.className = 'grammar-errors';
    g.errors.forEach(err => {
      const wrong = document.createElement('div');
      wrong.className = 'grammar-error wrong';
      wrong.innerHTML = `<div class="grammar-error-mark">✗</div><div class="grammar-error-content"><div class="grammar-error-form">${parseInline(err.wrong)}</div><div class="grammar-error-explain">${parseInline(err.explain)}</div></div>`;
      const right = document.createElement('div');
      right.className = 'grammar-error right';
      right.innerHTML = `<div class="grammar-error-mark">✓</div><div class="grammar-error-content"><div class="grammar-error-form">${parseInline(err.right)}</div></div>`;
      const pair = document.createElement('div');
      pair.className = 'grammar-error-pair';
      pair.appendChild(wrong);
      pair.appendChild(right);
      list.appendChild(pair);
    });
    sec.appendChild(list);
    card.appendChild(sec);
  }

  // Related topics
  if (g.relatedTopics && g.relatedTopics.length > 0) {
    const sec = makeSec('Смежные темы');
    const sugg = document.createElement('div');
    sugg.className = 'grammar-suggestions';
    g.relatedTopics.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'grammar-suggestion';
      btn.textContent = t;
      btn.onclick = () => { $('searchInput').value = t; lookupGrammar(t); };
      sugg.appendChild(btn);
    });
    sec.appendChild(sugg);
    card.appendChild(sec);
  }
  currentGramEntry = g;
  currentGramTopic = (g.title || '').toLowerCase();
  setTimeout(() => checkIfStarred('grammar', currentGramTopic), 100);
  updateFavCount();
}

function makeSec(label) {
  const sec = document.createElement('div');
  sec.className = 'grammar-section';
  const lbl = document.createElement('div');
  lbl.className = 'grammar-section-label';
  lbl.textContent = label;
  sec.appendChild(lbl);
  return sec;
}

function formatGrammarTitle(title) {
  // Italicize the last word for style
  const words = title.trim().split(' ');
  if (words.length <= 1) return `<em>${title}</em>`;
  const last = words.pop();
  return words.join(' ') + ' <em>' + last + '</em>';
}

function highlightStress(phonetic) {
  return (phonetic || '').replace(/ˈ([^ˌ\s.]+)/g, (m, syl) => `ˈ<span class="stress">${syl}</span>`);
}

function renderEntry(e) {
  currentDictEntry = e;
  currentDictWord = (e.word || '').toLowerCase();
  checkIfStarred('dict', (e.word || '').toLowerCase());

  // If entry is incomplete (from CSV import), show reload hint
  const isIncomplete = !e.definition || (!e.english?.main && e.english?.main !== undefined);
  const existingHint = document.getElementById('incompleteHint');
  if (existingHint) existingHint.remove();
  if (isIncomplete) {
    const hint = document.createElement('div');
    hint.id = 'incompleteHint';
    hint.style.cssText = 'text-align:center;padding:10px;font-size:13px;font-style:italic;color:var(--muted);cursor:pointer;';
    hint.innerHTML = '⟳ Неполная статья — <u>загрузить полностью</u>';
    hint.onclick = () => refreshEntry('dict');
    $('resultCard').appendChild(hint);
  }
  $('wordTitle').textContent = e.word;
  $('wordPhonetic').innerHTML = highlightStress(e.phonetic);
  $('wordType').textContent = e.partOfSpeech || '—';
  // Category badge
  const existingCat = document.getElementById('wordCategoryBadge');
  if (existingCat) existingCat.remove();
  if (e.category) {
    const cat = document.createElement('span');
    cat.id = 'wordCategoryBadge';
    cat.className = 'word-category-badge cat-' + (e.category || 'altro').toLowerCase().replace(/[^a-z]/g,'').slice(0,8);
    cat.textContent = e.category;
    $('wordType').after(cat);
  }
  $('wordGender').textContent = e.gender || '';
  $('transRU').textContent = e.russian?.main || '—';
  $('transRUalt').textContent = e.russian?.alternatives || '';
  $('transEN').textContent = e.english?.main || '—';
  $('transENalt').textContent = e.english?.alternatives || '';

  const pluralRow = $('pluralRow');
  if (e.isNoun && e.singular && e.plural) {
    pluralRow.style.display = 'grid';
    $('pluralForms').innerHTML = `
      <div class="plural-item">
        <div class="plural-item-label">Singolare</div>
        <div class="plural-item-form"><em>${e.singular.article}</em>${e.singular.form}</div>
      </div>
      <div class="plural-item">
        <div class="plural-item-label">Plurale</div>
        <div class="plural-item-form"><em>${e.plural.article}</em>${e.plural.form}</div>
      </div>`;
  } else {
    pluralRow.style.display = 'none';
  }

  $('definitionText').textContent = e.definition || '—';
  if (e.example) { $('exampleText').textContent = '« ' + e.example + ' »'; $('exampleText').style.display = 'block'; }
  else { $('exampleText').style.display = 'none'; }

  const conjSection = $('conjugationSection');
  if (e.isVerb && e.conjugations) {
    conjSection.style.display = 'block';
    currentConjugations = e.conjugations;
    renderTenseTabs(e.conjugations);
    $('conjBody').classList.remove('open');
    $('conjToggle').classList.remove('open');
  } else {
    conjSection.style.display = 'none';
  }
}

const TENSE_GROUPS = [
  { label: 'Indicativo', tenses: ['Indicativo Presente','Indicativo Passato Prossimo','Indicativo Imperfetto','Indicativo Trapassato Prossimo','Indicativo Passato Remoto','Indicativo Futuro Semplice','Indicativo Futuro Anteriore'] },
  { label: 'Congiuntivo', tenses: ['Congiuntivo Presente','Congiuntivo Passato','Congiuntivo Imperfetto','Congiuntivo Trapassato'] },
  { label: 'Condizionale', tenses: ['Condizionale Presente','Condizionale Passato'] },
  { label: 'Imperativo', tenses: ['Imperativo'] },
  { label: 'Forme nominali', tenses: ['Infinito','Participio','Gerundio'] }
];

function renderTenseTabs(conj) {
  const tabs = $('tenseTabs');
  tabs.innerHTML = '';
  const available = Object.keys(conj);
  let firstBtn = null, firstTense = null;
  TENSE_GROUPS.forEach(group => {
    const groupTenses = group.tenses.filter(t => available.includes(t));
    if (!groupTenses.length) return;
    const groupEl = document.createElement('div'); groupEl.className = 'tense-group';
    const labelEl = document.createElement('div'); labelEl.className = 'tense-group-label'; labelEl.textContent = group.label;
    groupEl.appendChild(labelEl);
    const btnsEl = document.createElement('div'); btnsEl.className = 'tense-group-buttons';
    groupTenses.forEach(tense => {
      const shortName = tense.replace(/^Indicativo |^Congiuntivo |^Condizionale /, '');
      const btn = document.createElement('button');
      btn.className = 'tense-tab'; btn.textContent = shortName; btn.dataset.tense = tense;
      btn.onclick = () => { document.querySelectorAll('.tense-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderConjTable(tense, conj[tense]); };
      btnsEl.appendChild(btn);
      if (!firstBtn) { firstBtn = btn; firstTense = tense; }
    });
    groupEl.appendChild(btnsEl); tabs.appendChild(groupEl);
  });
  if (firstBtn) { firstBtn.classList.add('active'); renderConjTable(firstTense, conj[firstTense]); }
}

function renderConjTable(tense, forms) {
  const wrap = $('conjTableWrap'); wrap.innerHTML = '';
  const title = document.createElement('div'); title.className = 'tense-title-display'; title.textContent = tense; wrap.appendChild(title);
  const grid = document.createElement('div'); grid.className = 'conj-grid';
  Object.entries(forms).forEach(([pronoun, form]) => {
    const row = document.createElement('div'); row.className = 'conj-row';
    row.innerHTML = `<div class="conj-pronoun">${pronoun}</div><div class="conj-form">${form}</div>`;
    grid.appendChild(row);
  });
  wrap.appendChild(grid);
}

  $('conjToggle').classList.toggle('open');
});

async function refreshEntry(mode) {
  const btnId = mode === 'dict' ? 'dictRefreshBtn' : 'gramRefreshBtn';
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('spinning');

  try {
    if (mode === 'dict') {
      const word = currentDictWord || (currentDictEntry && currentDictEntry.word ? currentDictEntry.word.toLowerCase() : '');
      console.log('refreshEntry dict, word:', word);
      if (!word) { console.warn('No word to refresh'); return; }
      const delRes = await fetch(`${SB_URL}/rest/v1/dictionary?word=eq.${encodeURIComponent(word)}`, { method: 'DELETE', headers: SB_H });
      console.log('Delete status:', delRes.status);
      await lookupWord(word);
    } else if (mode === 'grammar') {
      const topic = currentGramTopic || '';
      if (!topic) return;
      await fetch(`${SB_URL}/rest/v1/grammar?topic=eq.${encodeURIComponent(topic)}`, { method: 'DELETE', headers: SB_H });
      await lookupGrammar(topic);
    }
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

let cachedFavRows = [];

async function renderFavList(tab) {
  const list = $('favList');
  const searchEl = $('favSearch');
  if (searchEl) searchEl.value = '';
  list.innerHTML = '<div class="fav-empty" style="font-style:italic;opacity:0.5">Загрузка…</div>';
  const table = tab === 'words' ? 'favorites_dict' : 'favorites_grammar';
  const keyCol = tab === 'words' ? 'word' : 'topic';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?select=*&order=created_at.desc`, { headers: SB_H });
    const rows = await res.json();
    cachedFavRows = Array.isArray(rows) ? rows : [];
    list.innerHTML = '';
    if (cachedFavRows.length === 0) {
      list.innerHTML = '<div class="fav-empty">Пока ничего не сохранено — нажмите ★ на любой статье</div>';
      return;
    }
    renderFavRows(cachedFavRows, tab);
  } catch(e) { list.innerHTML = '<div class="fav-empty">Ошибка загрузки</div>'; }
}

function filterFavList() {
  const q = ($('favSearch')?.value || '').toLowerCase().trim();
  if (!q) { renderFavRows(cachedFavRows, currentFavTab); return; }
  const filtered = cachedFavRows.filter(row => {
    const d = row.data;
    const searchable = [
      row.word || row.topic || '',
      d?.word || d?.title || '',
      d?.titleRu || '',
      d?.russian?.main || '',
      d?.category || '',
      d?.partOfSpeech || '',
    ].join(' ').toLowerCase();
    return searchable.includes(q);
  });
  if (filtered.length === 0) {
    $('favList').innerHTML = `<div class="fav-empty-search">Ничего не найдено по «${q}»</div>`;
    return;
  }
  renderFavRows(filtered, currentFavTab);
}

function renderFavRows(rows, tab) {
  const list = $('favList');
  const keyCol = tab === 'words' ? 'word' : 'topic';
  list.innerHTML = '';
  rows.forEach(row => {
      const key = row[keyCol];
      const d = row.data;
      const card = document.createElement('div');
      card.className = 'fav-card';
      if (tab === 'words') {
        card.innerHTML = `
          <div class="fav-card-left">
            <div class="fav-card-word">${d.word || key}</div>
            <div class="fav-card-meta">${d.partOfSpeech || ''}${d.gender ? ' · ' + d.gender : ''} · ${d.russian?.main || ''}</div>
          </div>
          <div class="fav-card-right">
            <button class="fav-remove" title="Удалить" onclick="removeFav(event,'${tab}','${key.replace(/'/g,"\'")}')">✕</button>
            <span class="fav-card-arrow">→</span>
          </div>`;
        card.onclick = (e) => {
          if (e.target.classList.contains('fav-remove')) return;
          switchMode('dict');
          $('searchInput').value = key;
          renderEntry(row.data);
          showState('result');
          currentDictEntry = row.data;
          currentDictWord = key;
          checkIfStarred('dict', key);
        };
      } else {
        card.innerHTML = `
          <div class="fav-card-left">
            <div class="fav-card-word">${d.title || key}</div>
            <div class="fav-card-meta">${d.titleRu || ''} · ${d.category || ''}</div>
          </div>
          <div class="fav-card-right">
            <button class="fav-remove" title="Удалить" onclick="removeFav(event,'${tab}','${key.replace(/'/g,"\'")}')">✕</button>
            <span class="fav-card-arrow">→</span>
          </div>`;
        card.onclick = (e) => {
          if (e.target.classList.contains('fav-remove')) return;
          switchMode('grammar');
          $('searchInput').value = key;
          renderGrammar(row.data);
          showState('grammar');
        };
      }
      list.appendChild(card);
  });
}

async function removeFav(e, tab, key) {
  e.stopPropagation();
  const table = tab === 'words' ? 'favorites_dict' : 'favorites_grammar';
  const col = tab === 'words' ? 'word' : 'topic';
  await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(key)}`, { method: 'DELETE', headers: SB_H });
  renderFavList(tab);
  updateFavCount();
}

// ── Custom dialog (replaces browser prompt/confirm) ──────────────────────────
function showDialog({ title, sub = '', placeholder = '', okText = 'OK', okClass = '', hasInput = true, onOk }) {
  $('customDialogTitle').textContent = title;
  $('customDialogSub').textContent = sub;
  const input = $('customDialogInput');
  input.placeholder = placeholder;
  input.value = '';
  input.style.display = hasInput ? 'block' : 'none';
  const okBtn = $('customDialogOk');
  okBtn.textContent = okText;
  okBtn.className = 'custom-dialog-ok' + (okClass ? ' ' + okClass : '');
  $('customDialogOverlay').classList.add('open');
  if (hasInput) setTimeout(() => input.focus(), 100);

  // Remove old listeners
  const newOk = okBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  const newCancel = $('customDialogCancel').cloneNode(true);
  $('customDialogCancel').parentNode.replaceChild(newCancel, $('customDialogCancel'));

  const close = () => $('customDialogOverlay').classList.remove('open');

  $('customDialogOk').addEventListener('click', () => {
    const val = hasInput ? $('customDialogInput').value.trim() : true;
    close();
    onOk(val);
  });

  $('customDialogCancel').addEventListener('click', close);

  $('customDialogInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { $('customDialogOk').click(); }
    if (e.key === 'Escape') close();
  });
}

// ── Deck popup ────────────────────────────────────────────────────
async function openDeckPopup() {
  if (!currentDictEntry) return;
  const word = currentDictEntry.word || currentDictWord;
  $('deckPopupTitle').textContent = 'Добавить в колоду';
  $('deckPopupSub').textContent = '«' + word + '»';
  $('deckPopupInput').value = '';
  $('deckPopupOverlay').classList.add('open');

  const [decks, wordDecks] = await Promise.all([getDecks(), getWordDecks(word)]);
  const list = $('deckPopupList');
  list.innerHTML = '';

  if (decks.length === 0) {
    list.innerHTML = '<div style="font-style:italic;color:var(--muted);font-size:14px;padding:8px 0">Колод пока нет — создайте первую</div>';
    return;
  }

  decks.forEach(deck => {
    const inDeck = wordDecks.includes(deck.id);
    const item = document.createElement('div');
    item.className = 'deck-popup-item' + (inDeck ? ' added' : '');
    item.innerHTML = `
      <div class="deck-popup-item-name">${deck.name}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="deck-popup-item-check">✓</span>
      </div>
    `;
    item.onclick = async () => {
      if (item.classList.contains('added')) {
        await removeCardFromDeck(deck.id, word);
        item.classList.remove('added');
      } else {
        await addCardToDeck(deck.id, word, currentDictEntry);
        item.classList.add('added');
        // Auto close after short delay
        setTimeout(() => closeDeckPopup(), 800);
      }
    };
    list.appendChild(item);
  });
}

function closeDeckPopup(e) {
  if (e && e.target !== $('deckPopupOverlay')) return;
  $('deckPopupOverlay').classList.remove('open');
}

async function createDeckFromPopup() {
  const name = $('deckPopupInput').value.trim();
  if (!name) return;

// ── Import words ──────────────────────────────────────────────────
function parseCSV(text) {
  // Parse CSV with quoted fields
  const rows = [];
  const lines = text.replace(/\r/g, '').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let col = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        cols.push(col.trim());
        col = '';
      } else {
        col += ch;
      }
    }
    cols.push(col.trim());
    rows.push(cols);
  }
  return rows;
}

function csvRowToEntry(cols, headers) {
  // Map: Front, Transcription, Example, Back, Meaning
  const idx = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
  const frontIdx     = idx('front') !== -1 ? idx('front') : 0;
  const transIdx     = idx('transcription') !== -1 ? idx('transcription') : 1;
  const exampleIdx   = idx('example') !== -1 ? idx('example') : 2;
  const backIdx      = idx('back') !== -1 ? idx('back') : 3;
  const meaningIdx   = idx('meaning') !== -1 ? idx('meaning') : 4;

  const word = cols[frontIdx] || '';
  if (!word) return null;

  return {
    word: word,
    partOfSpeech: null,
    category: null,
    gender: null,
    phonetic: cols[transIdx] || '',
    singular: null,
    plural: null,
    russian: { main: cols[backIdx] || '', alternatives: '' },
    english: { main: '', alternatives: '' },
    definition: cols[meaningIdx] || '',
    example: cols[exampleIdx] || '',
    isNoun: false,
    isVerb: false,
    conjugations: null,
    _fromCSV: true
  };
}

async function handleImport(e, deckId) {
  const file = e.target.files[0];
  // Show debug toast
  const dbg = document.createElement('div');
  dbg.style.cssText = 'position:fixed;top:60px;left:16px;right:16px;background:#1a3a1a;color:#7ed87e;padding:12px 16px;border-radius:6px;font-size:14px;font-family:monospace;z-index:9999;line-height:1.6;';
  dbg.id = 'importDebug';
  document.body.appendChild(dbg);
  const log = (msg) => { dbg.innerHTML += msg + '<br>'; console.log('IMPORT:', msg); };

  if (!file) { log('❌ файл не выбран'); return; }
  log('✓ файл: ' + file.name + ' (' + file.size + ' байт)');
  log('✓ deckId: ' + deckId);

  let text;
  try { text = await file.text(); log('✓ текст прочитан: ' + text.length + ' символов'); }
  catch(err) { log('❌ ошибка чтения: ' + err.message); return; }

  const isCSV = file.name.toLowerCase().endsWith('.csv');
  log('isCSV: ' + isCSV);
  log('первые 100 символов: ' + JSON.stringify(text.slice(0, 100)));

  let entries = [];

  if (isCSV) {
    const rows = parseCSV(text);
    if (rows.length < 2) return;
    const headers = rows[0];
    const dataRows = rows.slice(1);

    // Check if it's our format (has Front/Back columns)
    const hasStructure = headers.some(h => /front|back/i.test(h));

    if (hasStructure) {
      // Direct import — no Gemini needed!
      entries = dataRows.map(cols => csvRowToEntry(cols, headers)).filter(Boolean);
      const screen = $('carteScreen');
      const progressDiv = document.createElement('div');
      progressDiv.style.cssText = 'padding:20px;font-style:italic;color:var(--muted);text-align:center;font-size:16px;';
      screen.insertBefore(progressDiv, screen.firstChild);

      let done = 0;
      for (const entry of entries) {
        progressDiv.textContent = `Импортирую ${done + 1} / ${entries.length}: ${entry.word}…`;
        try {
          await sbSave('dictionary', 'word', entry.word.toLowerCase(), entry);
          await addCardToDeck(deckId, entry.word.toLowerCase(), entry);
        } catch(err) { console.warn('Import error:', err); }
        done++;
      }
      progressDiv.remove();
      openDeckView(deckId, currentDeckName);
      return;
    } else {
      // CSV but no structure — treat first column as word list
      entries = dataRows.map(r => r[0]).filter(w => w && w.length < 80);
    }
  } else {
    // Plain .txt — one word per line
    entries = text.split(/\r?\n|\r/).map(l => l.trim()).filter(l => l.length > 0 && l.length < 80);
  }

  if (entries.length === 0) { log('❌ слов не найдено'); return; }
  log('✓ найдено слов: ' + entries.length + ', начинаю генерацию...');
  setTimeout(() => { const d = $('importDebug'); if(d) d.remove(); }, 4000);

  const screen = $('carteScreen');
  const progressDiv = document.createElement('div');
  progressDiv.style.cssText = 'padding:20px;font-style:italic;color:var(--muted);text-align:center;font-size:16px;';
  progressDiv.id = 'importProgress';
  screen.insertBefore(progressDiv, screen.firstChild);

  let done = 0;
  for (const word of entries) {
    progressDiv.textContent = `Генерирую ${done + 1} / ${entries.length}: ${word}…`;
    try {
      let entry = await sbGet('dictionary', word.toLowerCase());
      if (!entry) {
        entry = await generateWordEntry(word);
        if (entry && entry.word) {
          await sbSave('dictionary', 'word', entry.word.toLowerCase(), entry);
        }
      }
      if (entry && entry.word) {
        await addCardToDeck(deckId, entry.word.toLowerCase(), entry);
      }
    } catch(err) { console.warn('Import error for', word, err); }
    done++;
  }

  progressDiv.remove();
  openDeckView(deckId, currentDeckName);
}

async function generateWordEntry(word) {
  // Use the same full prompt as lookupWord for consistency
  const prompt = `You are an expert Italian linguist. Given the Italian word "${word}", provide a complete dictionary entry in JSON format.
Return ONLY valid JSON, no markdown, no explanation. Schema:
{
  "word": "canonical form",
  "partOfSpeech": "sostantivo / verbo / aggettivo / avverbio / preposizione / congiunzione / pronome / articolo / interiezione",
  "category": "cibo / natura / persone / lavoro / casa / viaggio / emozioni / tempo / corpo / cultura / altro",
  "gender": "m. / f. / m./f. / null",
  "phonetic": "IPA with ˈ before stressed syllable",
  "singular": { "article": "il/lo/la/l'", "form": "word" },
  "plural": { "article": "i/gli/le", "form": "plural form" },
  "russian": { "main": "primary Russian translation", "alternatives": "2-3 alts or empty" },
  "english": { "main": "primary English translation", "alternatives": "2-3 alts or empty" },
  "definition": "Definition in Italian (1-2 sentences)",
  "example": "Example sentence in Italian",
  "isNoun": true/false,
  "isVerb": true/false,
  "conjugations": null
}
If not a real Italian word, set word to null.`;
  return await callGemini(prompt);
}

// ── Study: Flashcard mode ─────────────────────────────────────────
let studyCards = [];
let studyIndex = 0;
let studyDeckId = '';
let studyDeckName = '';
let studyMode = 'flash';
let cardFlipped = false;

async function startStudy(deckId, deckName, mode) {
  studyDeckId = deckId;
  studyDeckName = deckName;
  studyMode = mode;
  const cards = await getDeckCards(deckId);
  if (cards.length === 0) { alert('В колоде нет слов!'); return; }

  // Each word generates 2 cards: IT→RU and RU→IT
  studyCards = [];
  cards.forEach(c => {
    studyCards.push({ ...c, direction: 'it-ru' });
    studyCards.push({ ...c, direction: 'ru-it' });
  });
  // Fisher-Yates shuffle
  for (let i = studyCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyCards[i], studyCards[j]] = [studyCards[j], studyCards[i]];
  }
  studyIndex = 0;

  if (mode === 'flash') renderFlashcard();
  else renderWriteCard();
}

function renderFlashcard() {
  const screen = $('flashcardScreen');
  // Hide other screens
  ['carteScreen','writeScreen'].forEach(id => $(id).classList.remove('active'));
  screen.classList.add('active');
  cardFlipped = false;

  const card = studyCards[studyIndex];
  const d = card.data;
  const isItRu = card.direction === 'it-ru';

  // IT→RU: front = итальянское слово + транскрипция + пример, back = русский перевод
  // RU→IT: front = русский перевод, back = итальянское слово + транскрипция
  const itWord = d.word || card.word;
  const ruWord = d.russian?.main || '';
  const phonetic = d.phonetic ? `/${d.phonetic}/` : '';
  const example = d.example || '';

  screen.innerHTML = `
    <div class="flashcard-top">
      <div class="flashcard-progress">${studyIndex + 1} / ${studyCards.length}</div>
      <button class="flashcard-exit" onclick="exitStudy()">Выйти</button>
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="theCard" onclick="flipCard()">
        <div class="flashcard-front">
          <div class="flashcard-hint">нажми чтобы открыть</div>
          ${isItRu ? `
            <div class="flashcard-word">${itWord}</div>
            ${phonetic ? `<div class="flashcard-phonetic">${phonetic}</div>` : ''}
            ${example ? `<div class="flashcard-example">${example}</div>` : ''}
          ` : `
            <div class="flashcard-word" style="font-family:'PT Serif',serif">${ruWord}</div>
          `}
        </div>
        <div class="flashcard-back">
          <div class="flashcard-hint">ОТВЕТ</div>
          ${isItRu ? `
            <div class="flashcard-word" style="font-family:'PT Serif',serif">${ruWord}</div>
            ${d.english?.main ? `<div class="flashcard-sub">${d.english.main}</div>` : ''}
          ` : `
            <div class="flashcard-word">${itWord}</div>
            ${phonetic ? `<div class="flashcard-phonetic">${phonetic}</div>` : ''}
            ${example ? `<div class="flashcard-example">${example}</div>` : ''}
          `}
        </div>
      </div>
    </div>
    <div class="flashcard-actions" id="fcActions" style="display:none">
      <button class="fc-btn dont-know" onclick="nextCard(false)">✗ Не знаю</button>
      <button class="fc-btn know" onclick="nextCard(true)">✓ Знаю</button>
    </div>
    <div class="flashcard-swipe-hint">Нажми на карточку чтобы перевернуть</div>
  `;
}

function flipCard() {
  const card = document.getElementById('theCard');
  cardFlipped = !cardFlipped;
  card.classList.toggle('flipped', cardFlipped);
  $('fcActions').style.display = cardFlipped ? 'flex' : 'none';
}

function nextCard(knew) {
  if (!knew && studyIndex < studyCards.length - 1) {
    // Move to end if didn't know
    studyCards.push(studyCards[studyIndex]);
  }
  studyIndex++;
  if (studyIndex >= studyCards.length) {
    showStudyComplete();
    return;
  }
  renderFlashcard();
}

function showStudyComplete() {
  $('flashcardScreen').innerHTML = `
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:20px">🎉</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);margin-bottom:8px">Complimenti!</div>
      <div style="font-style:italic;color:var(--muted);font-size:17px;margin-bottom:32px">Все карточки пройдены</div>
      <button onclick="startStudy('${studyDeckId}','${studyDeckName}','${studyMode}')" style="padding:14px 28px;background:var(--sage);color:white;border:none;border-radius:4px;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;margin-right:12px">Ещё раз</button>
      <button onclick="exitStudy()" style="padding:14px 28px;background:transparent;border:1.5px solid var(--border);border-radius:4px;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;color:var(--stone)">Выйти</button>
    </div>
  `;
}

function exitStudy() {
  $('flashcardScreen').classList.remove('active');
  $('writeScreen').classList.remove('active');
  $('carteScreen').classList.add('active');
  openDeckView(studyDeckId, studyDeckName);
}

// ── Study: Write mode ─────────────────────────────────────────────
function renderWriteCard() {
  const screen = $('writeScreen');
  ['carteScreen','flashcardScreen'].forEach(id => $(id).classList.remove('active'));
  screen.classList.add('active');

  const card = studyCards[studyIndex];
  const d = card.data;
  const isItRu = card.direction === 'it-ru';
  // Show Russian, type Italian — or show Italian, type Russian
  const prompt = isItRu ? (d.russian?.main || '') : (d.word || card.word);
  const promptLang = isItRu ? 'Переведите на итальянский:' : 'Переведите на русский:';
  const answer = isItRu ? (d.word || card.word) : (d.russian?.main || '');

  screen.innerHTML = `
    <div class="flashcard-top">
      <div class="flashcard-progress">${studyIndex + 1} / ${studyCards.length}</div>
      <button class="flashcard-exit" onclick="exitStudy()">Выйти</button>
    </div>
    <div class="write-prompt">
      <div class="write-prompt-hint">${promptLang}</div>
      <div class="write-prompt-word">${prompt}</div>
      <div class="write-prompt-sub">${isItRu ? (d.partOfSpeech || '') : (d.english?.main || '')}</div>
    </div>
    <div class="write-answer-area">
      <input class="write-input" id="writeInput" placeholder="Введите ответ…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="write-check-btn" id="writeCheckBtn" onclick="checkWriteAnswer('${answer.replace(/'/g,"\'")}')">Проверить</button>
      <div class="write-result" id="writeResult"></div>
      <button class="write-next-btn" id="writeNextBtn" onclick="nextWriteCard()">Следующее →</button>
    </div>
  `;

  const input = $('writeInput');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkWriteAnswer(answer); });
}

function checkWriteAnswer(answer) {
  const input = $('writeInput');
  const result = $('writeResult');
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = answer.trim().toLowerCase();

  // Allow minor variations
  const isCorrect = userAnswer === correctAnswer ||
    userAnswer.replace(/[àáâäãåā]/g,'a').replace(/[èéêëē]/g,'e')
      .replace(/[ìíîïī]/g,'i').replace(/[òóôöõō]/g,'o')
      .replace(/[ùúûüū]/g,'u') ===
    correctAnswer.replace(/[àáâäãåā]/g,'a').replace(/[èéêëē]/g,'e')
      .replace(/[ìíîïī]/g,'i').replace(/[òóôöõō]/g,'o')
      .replace(/[ùúûüū]/g,'u');

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  result.classList.add('show', isCorrect ? 'ok' : 'fail');
  result.textContent = isCorrect ? '✓ Правильно!' : `✗ Правильный ответ: ${answer}`;
  $('writeCheckBtn').style.display = 'none';
  $('writeNextBtn').classList.add('show');

  if (!isCorrect) {
    // Put at end of queue
    studyCards.push(studyCards[studyIndex]);
  }
}

function nextWriteCard() {
  studyIndex++;
  if (studyIndex >= studyCards.length) {
    $('writeScreen').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px;margin-bottom:20px">🎉</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);margin-bottom:8px">Complimenti!</div>
        <div style="font-style:italic;color:var(--muted);font-size:17px;margin-bottom:32px">Все слова пройдены</div>
        <button onclick="startStudy('${studyDeckId}','${studyDeckName}','write')" style="padding:14px 28px;background:var(--sage);color:white;border:none;border-radius:4px;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;margin-right:12px">Ещё раз</button>
        <button onclick="exitStudy()" style="padding:14px 28px;background:transparent;border:1.5px solid var(--border);border-radius:4px;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;color:var(--stone)">Выйти</button>
      </div>
    `;
    return;
  }
  renderWriteCard();
}

  const icon = $('favFloatIcon');
  const back = $('favFloatBack');
  if (!icon || !back) return;
  if (mode === 'favorites') {
    icon.style.display = 'none';
    back.style.display = 'block';
  } else {
    icon.style.display = 'block';
    back.style.display = 'none';
  }
}

// ── Floating fav button scroll behavior ──────────────────────────────────────
(function() {
  let lastScrollY = 0;
  let ticking = false;

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const btn = $('favFloatBtn');
        if (!btn) { ticking = false; return; }
        const currentY = window.scrollY;
        if (currentY > lastScrollY + 8) {
          btn.classList.add('hidden');
        } else if (currentY < lastScrollY - 8) {
          btn.classList.remove('hidden');
        }
        lastScrollY = currentY;
        ticking = false;
      });
      ticking = true;
    }
  });
})();
